<!-- app.component.html -->
<ion-app>
  <ion-split-pane contentId="main-content">
    <ion-menu contentId="main-content">
      <ion-content>
        <div class="menu-header" routerLink="/dashboard" (click)="closeMenu()">
          <h1>FreeVoices</h1>
        </div>

        <ion-list>
          <ion-menu-toggle auto-hide="false">
            <ion-item routerLink="/dashboard" routerLinkActive="selected" detail="false">
              <ion-icon name="grid-outline" slot="start"></ion-icon>
              <ion-label>Dashboard</ion-label>
            </ion-item>

            <ion-item routerLink="/customers" routerLinkActive="selected" detail="false">
              <ion-icon name="people-outline" slot="start"></ion-icon>
              <ion-label>Customers</ion-label>
            </ion-item>

            <ion-item routerLink="/invoices" routerLinkActive="selected" detail="false">
              <ion-icon name="document-text-outline" slot="start"></ion-icon>
              <ion-label>Invoices</ion-label>
            </ion-item>

            <ion-item routerLink="/quotes" routerLinkActive="selected" detail="false">
              <ion-icon name="receipt-outline" slot="start"></ion-icon>
              <ion-label>Quotes</ion-label>
            </ion-item>

            <ion-item routerLink="/products" routerLinkActive="selected" detail="false">
              <ion-icon name="cube-outline" slot="start"></ion-icon>
              <ion-label>Products</ion-label>
            </ion-item>

            <ion-item routerLink="/settings" routerLinkActive="selected" detail="false">
              <ion-icon name="settings-outline" slot="start"></ion-icon>
              <ion-label>Settings</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </ion-list>
      </ion-content>

      <ion-footer>
        <ion-item button (click)="logout()">
          <ion-icon name="log-out-outline" slot="start"></ion-icon>
          <ion-label>Logout</ion-label>
        </ion-item>
      </ion-footer>
    </ion-menu>

    <div class="ion-page" id="main-content">
      <ion-router-outlet></ion-router-outlet>
    </div>
  </ion-split-pane>
</ion-app>
