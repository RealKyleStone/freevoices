<ion-content class="ion-padding">
  <div class="auth-container">
    <ion-card class="auth-card">
      <ion-card-content>
        <h1 class="auth-title">Set New Password</h1>

        <div *ngIf="done" class="success-block">
          <ion-text color="success">
            <p>Password updated! Redirecting to login...</p>
          </ion-text>
        </div>

        <form *ngIf="!done" [formGroup]="form" (ngSubmit)="submit()">
          <ion-item>
            <ion-label position="floating">New Password</ion-label>
            <ion-input type="password" formControlName="password"></ion-input>
            <ion-text color="danger" *ngIf="isFieldInvalid('password')">
              <small>Password must be at least 8 characters</small>
            </ion-text>
          </ion-item>

          <ion-item>
            <ion-label position="floating">Confirm Password</ion-label>
            <ion-input type="password" formControlName="confirmPassword"></ion-input>
            <ion-text color="danger" *ngIf="mismatch">
              <small>Passwords do not match</small>
            </ion-text>
          </ion-item>

          <ion-text color="danger" *ngIf="errorMessage">
            <p class="status-message">{{ errorMessage }}</p>
          </ion-text>

          <ion-button expand="block" type="submit" [disabled]="isLoading || !token">
            <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
            <span *ngIf="!isLoading">Update Password</span>
          </ion-button>

          <div class="links-container">
            <a routerLink="/auth/login" class="back-link">Back to Login</a>
          </div>
        </form>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
