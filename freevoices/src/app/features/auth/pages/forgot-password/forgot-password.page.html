<ion-content class="ion-padding">
  <div class="auth-container">
    <ion-card class="auth-card">
      <ion-card-content>
        <h1 class="auth-title">Forgot Password</h1>
        <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>

        <form [formGroup]="form" (ngSubmit)="submit()">
          <ion-item>
            <ion-label position="floating">Email</ion-label>
            <ion-input type="email" formControlName="email" [clearInput]="true"></ion-input>
            <ion-text color="danger" *ngIf="isFieldInvalid('email')">
              <small>Enter a valid email address</small>
            </ion-text>
          </ion-item>

          <ion-text color="success" *ngIf="successMessage">
            <p class="status-message">{{ successMessage }}</p>
          </ion-text>

          <ion-text color="danger" *ngIf="errorMessage">
            <p class="status-message">{{ errorMessage }}</p>
          </ion-text>

          <ion-button expand="block" type="submit" [disabled]="isLoading">
            <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
            <span *ngIf="!isLoading">Send Reset Link</span>
          </ion-button>

          <div class="links-container">
            <a routerLink="/auth/login" class="back-link">Back to Login</a>
          </div>
        </form>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
