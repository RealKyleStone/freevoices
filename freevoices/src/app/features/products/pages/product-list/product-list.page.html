<ion-header>
  <ion-toolbar>
    <ion-title>Products</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/products/new" color="primary">
        <ion-icon slot="icon-only" name="add-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar
      [(ngModel)]="searchTerm"
      (ionInput)="onSearchChange()"
      placeholder="Search by name or description"
      debounce="0">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list *ngIf="!isLoading && products.length > 0">
    <ion-item *ngFor="let product of products" [routerLink]="['/products', product.id]" detail="false" button>
      <ion-icon name="cube-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h2>{{ product.name }}</h2>
        <p *ngIf="product.description">{{ product.description }}</p>
        <p>
          R {{ product.price | number:'1.2-2' }}
          <ion-badge *ngIf="product.vat_inclusive" color="medium" style="margin-left: 0.5rem; font-size: 0.7rem;">VAT incl.</ion-badge>
        </p>
      </ion-label>
      <div slot="end" class="row-actions">
        <ion-button fill="clear" [routerLink]="['/products', product.id, 'edit']" (click)="$event.stopPropagation()">
          <ion-icon slot="icon-only" name="create-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" color="danger" (click)="$event.stopPropagation(); confirmDelete(product)">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-button>
      </div>
    </ion-item>
  </ion-list>

  <div class="empty-state" *ngIf="!isLoading && products.length === 0">
    <ion-icon name="cube-outline"></ion-icon>
    <p *ngIf="searchTerm">No products match "{{ searchTerm }}"</p>
    <p *ngIf="!searchTerm">No products yet. Add your first one!</p>
    <ion-button routerLink="/products/new" fill="outline">Add Product</ion-button>
  </div>

  <div class="loading-state" *ngIf="isLoading">
    <ion-spinner></ion-spinner>
  </div>

  <div class="pagination" *ngIf="!isLoading && totalPages > 1">
    <ion-button fill="clear" [disabled]="page === 1" (click)="prevPage()">
      <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
    </ion-button>
    <span>{{ page }} / {{ totalPages }}</span>
    <ion-button fill="clear" [disabled]="page === totalPages" (click)="nextPage()">
      <ion-icon slot="icon-only" name="chevron-forward-outline"></ion-icon>
    </ion-button>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button routerLink="/products/new" color="primary">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
