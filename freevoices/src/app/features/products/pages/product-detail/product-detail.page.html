<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/products"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ product?.name || 'Product' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button [routerLink]="['/products', productId, 'edit']">
        <ion-icon slot="icon-only" name="create-outline"></ion-icon>
      </ion-button>
      <ion-button (click)="confirmDelete()" color="danger">
        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="loading-state" *ngIf="isLoading">
    <ion-spinner color="primary"></ion-spinner>
  </div>

  <ng-container *ngIf="!isLoading && product">
    <div class="detail-container">

      <!-- Product header -->
      <div class="profile-card">
        <div class="product-icon-wrap">
          <ion-icon name="cube-outline"></ion-icon>
        </div>
        <div class="profile-info">
          <h2>{{ product.name }}</h2>
          <p *ngIf="product.description" class="description">{{ product.description }}</p>
        </div>
      </div>

      <!-- Pricing card -->
      <ion-card class="info-card">
        <ion-card-header>
          <ion-card-title>Pricing</ion-card-title>
        </ion-card-header>
        <ion-card-content class="ion-no-padding">
          <ion-list lines="full">
            <ion-item>
              <div slot="start" class="detail-icon-wrap">
                <ion-icon name="pricetag-outline"></ion-icon>
              </div>
              <ion-label>
                <p class="detail-label">Price</p>
                <h3>R {{ product.price | number:'1.2-2' }}</h3>
              </ion-label>
            </ion-item>
            <ion-item lines="none">
              <div slot="start" class="detail-icon-wrap">
                <ion-icon name="receipt-outline"></ion-icon>
              </div>
              <ion-label>
                <p class="detail-label">VAT</p>
                <h3>{{ product.vat_inclusive ? 'Price includes VAT' : 'VAT not included' }}</h3>
              </ion-label>
              <div slot="end">
                <span class="vat-badge" [class.vat-incl]="product.vat_inclusive" [class.vat-excl]="!product.vat_inclusive">
                  {{ product.vat_inclusive ? 'Incl.' : 'Excl.' }}
                </span>
              </div>
            </ion-item>
          </ion-list>
        </ion-card-content>
      </ion-card>

    </div>
  </ng-container>
</ion-content>
